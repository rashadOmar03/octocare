name: smart_clinic
description: Octocare Clinic Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  intl: ^0.20.2
  google_fonts: ^6.2.0
  fl_chart: ^0.69.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  http_parser: ^4.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.3.0
  flutter_pdfview: ^1.3.0
  web: ^1.1.1
  flutter_bluetooth_serial_plus: ^0.5.1
  permission_handler: ^12.0.3
  web_socket_channel: ^3.0.2
  record: 6.1.0
  audioplayers: ^6.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: false
  assets:
    - assets/images/
